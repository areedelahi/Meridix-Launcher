name: Build macOS DMG

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target

      - name: Install dependencies
        run: flutter pub get

      - name: Build Rust library
        run: |
          cd rust_builder
          flutter pub get
          cd ..

      - name: Build macOS app
        run: flutter build macos --release

      - name: Create DMG
        run: |
          mkdir -p build/macos/dmg
          mkdir -p build/macos/Release

          # Debug: show what was actually built
          ls build/macos/Build/Products/Release/

          cp -r "build/macos/Build/Products/Release/Meridix Launcher.app" build/macos/dmg/

          hdiutil create -volname "Meridix Launcher" \
            -srcfolder build/macos/dmg \
            -ov \
            -format UDZO \
            build/macos/Release/Meridix-Launcher.dmg

      - name: Sign DMG
        continue-on-error: true
        run: |
          codesign -s "${{ secrets.MACOS_CERTIFICATE_ID }}" \
            --options runtime \
            build/macos/Release/Meridix-Launcher.dmg

      - name: Notarize DMG
        continue-on-error: true
        run: |
          xcrun notarytool submit build/macos/Release/Meridix-Launcher.dmg \
            --apple-id "${{ secrets.MACOS_NOTARY_USER }}" \
            --password "${{ secrets.MACOS_NOTARY_PASSWORD }}" \
            --team-id "${{ secrets.MACOS_TEAM_ID }}" \
            --wait

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: meridix-launcher-macos-arm64
          path: build/macos/Release/Meridix-Launcher.dmg
          retention-days: 30

  create-release:
    needs: build-macos
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/Meridix-Launcher.dmg
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
