name: Build Windows MSIX

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target

      - name: Install dependencies
        run: flutter pub get

      - name: Build Rust library
        run: |
          cd rust_builder
          flutter pub get
          cd ..

      - name: Build Windows app
        run: flutter build windows --release

      - name: Create MSIX Package
        run: dart run msix:create --build-windows false --install-certificate false --output-name ausrine-launcher

      - name: Find generated MSIX
        run: |
          echo "=== Searching for .msix files ==="
          Get-ChildItem -Path . -Filter "*.msix" -Recurse | Select-Object FullName, Length

      - name: Upload MSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: ausrine-launcher-windows-msix
          path: "**/*.msix"
          retention-days: 30
          if-no-files-found: error

      - name: Zip Windows Portable
        run: Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath ausrine-launcher-windows-portable.zip

      - name: Upload Windows portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: ausrine-launcher-windows-portable
          path: ausrine-launcher-windows-portable.zip
          retention-days: 30

  create-release:
    needs: build-windows
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/ausrine-launcher.msix
            artifacts/**/Release/**
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
