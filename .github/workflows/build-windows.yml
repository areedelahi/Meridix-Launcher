with open("rust.yml", "w") as f:
    f.write("""name: Rust CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    name: Build and Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Set up Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            rust -> target
            rust_builder -> target

      # --- Main Rust Code Steps ---
      
      - name: Check formatting (rust)
        working-directory: ./rust
        run: cargo fmt --all -- --check

      - name: Run Clippy (rust)
        working-directory: ./rust
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Build Main Code (rust)
        working-directory: ./rust
        run: cargo build --verbose

      - name: Run tests (rust)
        working-directory: ./rust
        run: cargo test --verbose

      # --- Rust Builder Steps ---
      
      - name: Build Rust Builder (rust_builder)
        working-directory: ./rust_builder
        run: cargo build --verbose
""")
