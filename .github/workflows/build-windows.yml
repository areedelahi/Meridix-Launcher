name: Build Windows MSIX

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      # Caches the Rust build artifacts to significantly speed up future workflow runs
      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          # This tells the cache where your Rust workspace is located.
          # If your Cargo.toml is in a different folder, adjust 'rust' to match your directory name.
          workspaces: rust -> target

      - name: Install dependencies
        run: flutter pub get

      - name: Build Rust library
        run: |
          cd rust_builder
          flutter pub get
          cd ..

      - name: Build Windows app
        run: flutter build windows --release

      - name: Create and Sign MSIX Package
        run: |
          flutter pub add --dev msix
          dart run msix:create --certificate-path "${{ secrets.WINDOWS_CERTIFICATE_PATH }}" --certificate-password "${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}"
        continue-on-error: true

      - name: Upload Windows MSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: meridix-launcher-windows-msix
          path: Meridix-Launcher.msix
          retention-days: 30

      - name: Upload Windows app artifact
        uses: actions/upload-artifact@v4
        with:
          name: meridix-launcher-windows-portable
          path: build/windows/x64/runner/Release/
          retention-days: 30

  create-release:
    needs: build-windows
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/Meridix-Launcher.msix
            artifacts/**/Release/**
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
