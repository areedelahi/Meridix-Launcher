name: Build Windows MSIX

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'
          cache: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install dependencies
        run: flutter pub get

      - name: Build Rust library
        run: |
          cd rust_builder
          flutter pub get
          cd ..

      - name: Build Windows app
        run: flutter build windows --release

      - name: Install MSIX tools
        run: |
          # Download MsixHeroUI or use msix package
          pip install msix

      - name: Create MSIX package
        run: |
          msix create \
              --manifest windows/msix/AppxManifest.xml \
              --input build\\windows\\x64\\runner\\Release \
              --output Meridix-Launcher.msix \
              --certificate-file ${{ secrets.WINDOWS_CERTIFICATE_PATH }} \
              --certificate-password "${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}"
        continue-on-error: true

      - name: Create MSIX (Alternative - using Flutter build)
        if: failure()
        run: |
          # Alternative: use flutter build windows with msix configuration
          flutter build windows --release --split-debug-info build/windows/debug_info

      - name: Sign MSIX
        if: ${{ secrets.WINDOWS_CERTIFICATE_PATH != '' }}
        run: |
          # Sign the MSIX package
          signtool sign /f "${{ secrets.WINDOWS_CERTIFICATE_PATH }}" \
              /p "${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}" \
              /fd SHA256 /tr http://timestamp.digicert.com \
              Meridix-Launcher.msix

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: meridix-launcher-windows-msix
          path: Meridix-Launcher.msix
          retention-days: 30

      - name: Upload Windows app artifact
        uses: actions/upload-artifact@v4
        with:
          name: meridix-launcher-windows-portable
          path: build/windows/x64/runner/Release/
          retention-days: 30

  create-release:
    needs: build-windows
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/**/Meridix-Launcher.msix
            artifacts/**/Release/**
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
