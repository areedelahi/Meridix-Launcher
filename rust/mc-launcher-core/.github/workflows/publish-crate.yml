name: Publish crate

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: publish-crate-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Read crate metadata
        id: crate
        shell: bash
        run: |
          metadata="$(cargo metadata --no-deps --format-version 1)"
          manifest_path="${GITHUB_WORKSPACE}/Cargo.toml"
          crate_name="$(jq -r --arg manifest_path "$manifest_path" '.packages[] | select(.manifest_path == $manifest_path) | .name' <<< "$metadata")"
          crate_version="$(jq -r --arg manifest_path "$manifest_path" '.packages[] | select(.manifest_path == $manifest_path) | .version' <<< "$metadata")"

          if [[ -z "$crate_name" || -z "$crate_version" || "$crate_name" == "null" || "$crate_version" == "null" ]]; then
            echo "Unable to read crate metadata from Cargo.toml." >&2
            exit 1
          fi

          echo "name=$crate_name" >> "$GITHUB_OUTPUT"
          echo "version=$crate_version" >> "$GITHUB_OUTPUT"

      - name: Check crates.io version
        id: cratesio
        shell: bash
        run: |
          status="$(curl -sS -o /dev/null -w "%{http_code}" \
            -H "User-Agent: ${GITHUB_REPOSITORY} GitHub Actions" \
            "https://crates.io/api/v1/crates/${{ steps.crate.outputs.name }}/${{ steps.crate.outputs.version }}")"

          case "$status" in
            200)
              echo "publish=false" >> "$GITHUB_OUTPUT"
              echo "Version already exists on crates.io; skipping publish."
              ;;
            404)
              echo "publish=true" >> "$GITHUB_OUTPUT"
              echo "Version is not on crates.io yet; publishing."
              ;;
            *)
              echo "Unexpected crates.io response status: $status" >&2
              exit 1
              ;;
          esac

      - name: Verify package
        if: steps.cratesio.outputs.publish == 'true'
        run: cargo publish --dry-run --locked

      - name: Publish crate
        if: steps.cratesio.outputs.publish == 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        shell: bash
        run: |
          if [[ -z "$CARGO_REGISTRY_TOKEN" ]]; then
            echo "Missing CARGO_REGISTRY_TOKEN repository secret." >&2
            exit 1
          fi

          cargo publish --locked --token "$CARGO_REGISTRY_TOKEN"
